<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <!-- ===== dashed declination circles ===== -->
  <g fill="none">
    <circle cx="800" cy="500" r="452" stroke="#6EA79D" stroke-opacity="0.11" stroke-width="1.2" stroke-dasharray="2 11" />
    <circle cx="800" cy="500" r="300" stroke="#C9A24E" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="1 15" />
  </g>

  <!-- ===== hour-circle meridians, converging toward a pole above frame ===== -->
  <g fill="none" stroke="#6EA79D" stroke-opacity="0.11" stroke-width="1" stroke-linecap="round">
    <path d="M120,1080 C420,560 620,180 760,-360" />
    <path d="M480,1080 C660,560 730,180 760,-360" />
    <path d="M1120,1080 C980,560 850,180 760,-360" />
    <path d="M1480,1080 C1240,560 940,180 760,-360" />
  </g>

  <!-- ===== celestial equator + ecliptic: big-amplitude crossing waves ===== -->
  <path d="M-100,500 C300,830 520,830 800,500 C1080,170 1300,170 1700,500" fill="none"
        stroke="#6EA79D" stroke-opacity="0.22" stroke-width="1.6" stroke-linecap="round" />
  <path d="M-100,500 C300,170 520,170 800,500 C1080,830 1300,830 1700,500" fill="none"
        stroke="#C9A24E" stroke-opacity="0.30" stroke-width="2" stroke-linecap="round" />

  <!-- ===== scattered background stars ===== -->
  <g fill="#F3ECD9">
    <circle cx="180"  cy="240" r="2"   fill-opacity="0.30" />
    <circle cx="260"  cy="760" r="1.6" fill-opacity="0.24" />
    <circle cx="520"  cy="180" r="2.4" fill-opacity="0.42" />
    <circle cx="640"  cy="620" r="1.4" fill-opacity="0.22" />
    <circle cx="720"  cy="900" r="1.8" fill-opacity="0.30" />
    <circle cx="900"  cy="140" r="1.5" fill-opacity="0.24" />
    <circle cx="1040" cy="520" r="2"   fill-opacity="0.34" />
    <circle cx="1180" cy="300" r="2.6" fill-opacity="0.46" />
    <circle cx="1320" cy="700" r="1.6" fill-opacity="0.25" />
    <circle cx="1460" cy="220" r="2"   fill-opacity="0.30" />
    <circle cx="1500" cy="560" r="1.4" fill-opacity="0.22" />
    <circle cx="380"  cy="460" r="1.6" fill-opacity="0.28" />
    <circle cx="300"  cy="900" r="2"   fill-opacity="0.32" />
    <circle cx="1240" cy="900" r="1.5" fill-opacity="0.24" />
    <circle cx="1400" cy="420" r="2.2" fill-opacity="0.36" />
    <circle cx="120"  cy="640" r="1.8" fill-opacity="0.30" />
    <circle cx="560"  cy="340" r="1.3" fill-opacity="0.20" />
    <circle cx="860"  cy="700" r="2"   fill-opacity="0.34" />
    <circle cx="980"  cy="860" r="1.6" fill-opacity="0.26" />
    <circle cx="1120" cy="120" r="1.4" fill-opacity="0.22" />
    <circle cx="700"  cy="260" r="1.8" fill-opacity="0.30" />
    <circle cx="460"  cy="700" r="1.5" fill-opacity="0.24" />
    <circle cx="1560" cy="760" r="2"   fill-opacity="0.32" />
    <circle cx="240"  cy="360" r="1.4" fill-opacity="0.22" />
  </g>

  <!-- ===== deep-sky markers (open circles) ===== -->
  <g fill="none" stroke="#C9A24E" stroke-opacity="0.18" stroke-width="1.2">
    <circle cx="430"  cy="300" r="9" />
    <circle cx="1180" cy="660" r="7" />
    <circle cx="960"  cy="250" r="6" />
  </g>

  <!-- ===== plotted crosses ===== -->
  <g stroke="#C9A24E" stroke-opacity="0.28" stroke-width="1.4" stroke-linecap="round">
    <path d="M620,500 l0,16 M612,508 l16,0" />
    <path d="M1080,540 l0,16 M1072,548 l16,0" />
    <path d="M300,560 l0,14 M293,567 l14,0" />
    <path d="M1400,840 l0,14 M1393,847 l14,0" />
  </g>

  <!-- ===== small compass rose ===== -->
  <g fill="none" stroke="#6EA79D" stroke-opacity="0.20" stroke-width="1.1" stroke-linecap="round">
    <circle cx="1330" cy="790" r="26" />
    <path d="M1330,752 l0,20 M1330,808 l0,20 M1292,790 l20,0 M1348,790 l20,0" />
    <path d="M1330,762 l7,20 -14,0 z" fill="#C9A24E" fill-opacity="0.22" stroke="none" />
  </g>

  <!-- ===== faint chart marginalia — positional-astronomy equations ===== -->
  <g fill="#C9A24E" fill-opacity="0.20" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace" font-size="22">
    <text x="72" y="150">GMST = 280.4606° + 360.9856° · d</text>
    <text x="72" y="912">H = LST − α</text>
    <text x="1040" y="150">m − M = 5 log₁₀ d − 5</text>
    <text x="905" y="912">sin a = sin φ sin δ + cos φ cos δ cos H</text>
  </g>
</svg>
