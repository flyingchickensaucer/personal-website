    </g>
    <g transform="translate(360,300)">
      <circle r="9"  fill="#F3ECD9" fill-opacity="0.10" stroke="none" />
      <circle r="2.6" fill="#FFF7E4" fill-opacity="0.9" stroke="none" />
      <path d="M0,-14 L0,-5 M0,14 L0,5 M-14,0 L-5,0 M14,0 L5,0 M-9,-9 L-3.5,-3.5 M9,9 L3.5,3.5 M9,-9 L3.5,-3.5 M-9,9 L-3.5,3.5"
