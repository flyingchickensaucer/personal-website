<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <!-- ===== curved celestial coordinate grid ===== -->
  <!-- Dec parallels (gently bowed) -->
  <g fill="none" stroke="#6EA79D" stroke-opacity="0.15" stroke-width="1">
    <path d="M-40,140 Q800,105 1640,140" />
    <path d="M-40,280 Q800,245 1640,280" />
    <path d="M-40,420 Q800,385 1640,420" />
    <path d="M-40,560 Q800,525 1640,560" />
    <path d="M-40,700 Q800,665 1640,700" />
    <path d="M-40,840 Q800,805 1640,840" />
  </g>
  <!-- RA meridians (fanning toward the pole above) -->
  <g fill="none" stroke="#6EA79D" stroke-opacity="0.15" stroke-width="1">
    <path d="M60,1040 C260,540 460,180 700,-320" />
    <path d="M340,1040 C470,540 600,180 720,-320" />
    <path d="M620,1040 C660,540 700,180 740,-320" />
    <path d="M900,1040 C860,540 800,180 760,-320" />
    <path d="M1180,1040 C1060,540 900,180 780,-320" />
    <path d="M1460,1040 C1270,540 1020,180 800,-320" />
  </g>

  <!-- ===== dotted constellation boundaries ===== -->
  <g fill="none" stroke="#6EA79D" stroke-opacity="0.16" stroke-width="1.1" stroke-dasharray="1.5 9">
    <path d="M470,40 C540,300 380,500 520,780 C560,880 500,960 540,1040" />
    <path d="M980,20 C920,240 1060,440 1000,700 C970,860 1040,940 1010,1040" />
    <path d="M-20,540 C360,585 720,505 1120,548 C1360,572 1520,520 1640,552" />
  </g>

  <!-- ===== phase lines: celestial equator + ecliptic (big crossing waves) ===== -->
  <path d="M-100,500 C300,830 520,830 800,500 C1080,170 1300,170 1700,500" fill="none"
        stroke="#6EA79D" stroke-opacity="0.15" stroke-width="1.6" stroke-linecap="round" />
  <path d="M-100,500 C300,170 520,170 800,500 C1080,830 1300,830 1700,500" fill="none"
        stroke="#C9A24E" stroke-opacity="0.20" stroke-width="2" stroke-linecap="round" />

  <!-- ===== deep-sky markers (open circles) ===== -->
  <g fill="none" stroke="#C9A24E" stroke-opacity="0.16" stroke-width="1.1">
    <circle cx="430" cy="300" r="8" />
    <circle cx="1180" cy="640" r="6.5" />
    <circle cx="960" cy="240" r="5.5" />
  </g>

  <!-- ===== dense star field ===== -->
  <g fill="#F3ECD9">
    <circle cx="70"   cy="90"  r="1.4" fill-opacity="0.35" />
    <circle cx="150"  cy="200" r="0.9" fill-opacity="0.20" />
