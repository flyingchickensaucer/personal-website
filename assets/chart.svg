  <!-- ===== named bright stars (starbursts) ===== -->
  <g stroke="#F3ECD9" stroke-linecap="round">
    <g transform="translate(1250,700)">
      <circle r="11" fill="#F3ECD9" fill-opacity="0.10" stroke="none" />
      <circle r="3"  fill="#FFF7E4" fill-opacity="0.9" stroke="none" />
      <path d="M0,-17 L0,-6 M0,17 L0,6 M-17,0 L-6,0 M17,0 L6,0 M-11,-11 L-4,-4 M11,11 L4,4 M11,-11 L4,-4 M-11,11 L-4,4"
