<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RECOIL — your gun is your engine</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="hud" class="hud hidden">
      <div class="hud__corner hud__corner--tl">
        <div class="hud__label">SCORE</div>
        <div id="score" class="hud__value">0</div>
      </div>
      <div class="hud__corner hud__corner--tr">
        <div class="hud__label">BEST</div>
        <div id="best" class="hud__value">0</div>
      </div>
      <div id="combo" class="combo"></div>
    </div>

    <div id="title" class="overlay">
      <div class="overlay__inner">
        <h1 class="logo">RECOIL</h1>
        <p class="tagline">Your gun is your engine.</p>
        <div class="how">
          <div class="how__row"><kbd>MOUSE</kbd><span>aim</span></div>
          <div class="how__row"><kbd>CLICK</kbd><span>fire &mdash; recoil thrusts you back</span></div>
          <div class="how__row"><span class="chip chip--gold"></span><span>fly into gold cores</span></div>
          <div class="how__row"><span class="chip chip--red"></span><span>never touch red</span></div>
        </div>
        <button id="play" class="btn">LAUNCH</button>
        <p class="hint">You can't walk. To go right, aim left and shoot.</p>
      </div>
    </div>

    <div id="gameover" class="overlay hidden">
      <div class="overlay__inner">
        <h2 class="dead">WRECKED</h2>
        <div class="result">
          <div class="result__block">
            <div class="result__label">SCORE</div>
            <div id="final-score" class="result__value">0</div>
          </div>
          <div class="result__block">
            <div class="result__label">BEST</div>
            <div id="final-best" class="result__value">0</div>
          </div>
        </div>
        <div id="newbest" class="newbest hidden">NEW BEST</div>
        <button id="again" class="btn">RELAUNCH</button>
        <p class="hint">Press <kbd>R</kbd> or <kbd>Space</kbd> to relaunch</p>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
