<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STASIS — time moves only when you do</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="game"></canvas>

    <!-- HUD -->
    <div id="hud" class="hud hidden">
      <div class="hud__corner hud__corner--tl">
        <div class="hud__label">SCORE</div>
        <div id="score" class="hud__value">0</div>
      </div>
      <div class="hud__corner hud__corner--tr">
        <div class="hud__label">BEST</div>
        <div id="best" class="hud__value">0</div>
      </div>
      <div id="combo" class="combo"></div>
      <div id="timebar" class="timebar"><span id="timebar-fill"></span></div>
    </div>

    <!-- Title screen -->
    <div id="title" class="overlay">
      <div class="overlay__inner">
        <h1 class="logo">STASIS</h1>
        <p class="tagline">Time moves only when you do.</p>
        <div class="how">
          <div class="how__row"><kbd>WASD</kbd><span>move &amp; advance time</span></div>
          <div class="how__row"><kbd>MOUSE</kbd><span>aim</span></div>
          <div class="how__row"><kbd>CLICK</kbd><span>fire</span></div>
          <div class="how__row"><span class="dot dot--danger"></span><span>one hit ends it</span></div>
        </div>
        <button id="play" class="btn">ENTER THE FREEZE</button>
        <p class="hint">Stand still and the world holds its breath.</p>
      </div>
    </div>

    <!-- Game over -->
    <div id="gameover" class="overlay hidden">
      <div class="overlay__inner">
        <h2 class="dead">FLATLINE</h2>
        <div class="result">
          <div class="result__block">
            <div class="result__label">SCORE</div>
            <div id="final-score" class="result__value">0</div>
          </div>
          <div class="result__block">
            <div class="result__label">BEST</div>
            <div id="final-best" class="result__value">0</div>
          </div>
        </div>
        <div id="newbest" class="newbest hidden">NEW BEST</div>
        <button id="again" class="btn">GO AGAIN</button>
        <p class="hint">Press <kbd>R</kbd> or <kbd>Space</kbd> to restart</p>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
