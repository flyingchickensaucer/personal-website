<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Gravity Wells</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; overflow: hidden; background: #05060f; cursor: crosshair; }
  canvas { display: block; }

  #ui {
    position: fixed; top: 14px; left: 14px;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 12px; color: rgba(255,255,255,0.82);
    background: rgba(12,14,28,0.55); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
    padding: 14px 16px; width: 220px; user-select: none;
    box-shadow: 0 10px 40px rgba(0,0,0,0.45);
  }
  #ui h1 {
    margin: 0 0 4px; font-size: 14px; letter-spacing: 0.06em; font-weight: 600;
    background: linear-gradient(90deg,#7dd3fc,#c084fc,#fb7185);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  #ui .sub { margin: 0 0 12px; font-size: 10px; color: rgba(255,255,255,0.45); line-height: 1.5; }
  #ui label { display: flex; justify-content: space-between; align-items: center; margin: 9px 0 3px; font-size: 11px; color: rgba(255,255,255,0.7); }
  #ui label span { color: #7dd3fc; }
  #ui input[type=range] { width: 100%; accent-color: #c084fc; height: 4px; }
  #ui .row { display: flex; gap: 8px; margin-top: 12px; }
  #ui button {
    flex: 1; font-family: inherit; font-size: 11px; cursor: pointer;
    color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 9px; padding: 7px 6px;
    transition: background 0.15s, transform 0.08s;
  }
  #ui button:hover { background: rgba(255,255,255,0.14); }
  #ui button:active { transform: scale(0.96); }
  #ui button.on { background: rgba(192,132,252,0.25); border-color: rgba(192,132,252,0.5); color: #e9d5ff; }
  #hint {
    position: fixed; bottom: 16px; left: 0; right: 0; text-align: center;
    font-family: ui-monospace, Menlo, monospace; font-size: 12px;
    color: rgba(255,255,255,0.4); pointer-events: none; transition: opacity 1s ease;
  }
  #hint.fade { opacity: 0; }
  #toggle {
    position: fixed; top: 14px; left: 14px; z-index: 5; display: none;
    font-family: ui-monospace, monospace; font-size: 16px; cursor: pointer;
    background: rgba(12,14,28,0.55); color: #fff; border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; width: 34px; height: 34px; line-height: 32px; text-align: center;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="toggle">☰</button>
<div id="ui">
  <h1>GRAVITY WELLS</h1>
  <p class="sub">click &amp; drag to drop a well · scroll a well to change its mass · right-click to erase the nearest well</p>
  <label>Particles <span id="vCount">2200</span></label>
  <input id="count" type="range" min="200" max="6000" step="100" value="2200" />
  <label>Gravity <span id="vGrav">1.0</span></label>
  <input id="grav" type="range" min="0" max="3" step="0.05" value="1" />
  <label>Trails <span id="vTrail">0.88</span></label>
  <input id="trail" type="range" min="0.5" max="0.99" step="0.01" value="0.88" />
  <label>Speed <span id="vSpeed">1.0</span></label>
  <input id="speed" type="range" min="0.2" max="2.5" step="0.05" value="1" />
  <div class="row">
    <button id="palette">PALETTE</button>
    <button id="orbit" class="on">ORBIT</button>
  </div>
  <div class="row">
    <button id="burst">BURST</button>
    <button id="clear">CLEAR</button>
  </div>
</div>
<div id="hint">click anywhere to bend space · drag to fling particles · scroll over a well to grow it</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha: false });
let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ---- Palettes (hue ranges, particles colored by speed) ----
const PALETTES = [
  { name: 'Nebula',  base: 200, range: 120 }, // blue -> magenta
  { name: 'Inferno', base: 0,   range: 60  }, // red -> yellow
  { name: 'Aurora',  base: 120, range: 110 }, // green -> cyan
  { name: 'Candy',   base: 280, range: 90  }, // purple -> pink
  { name: 'Mono',    base: 190, range: 30  },
];
let paletteIdx = 0;

const params = {
  count: 2200, grav: 1.0, trail: 0.88, speed: 1.0, orbit: true,
};

// ---- Wells ----
let wells = [];
function addWell(x, y, mass = 1) {
  wells.push({ x, y, mass, r: 0, pulse: 0 });
}

// ---- Particles ----
let particles = [];
function spawnParticles(n) {
  particles = [];
  for (let i = 0; i < n; i++) particles.push(newParticle());
}
function newParticle() {
  const edge = Math.floor(Math.random() * 4);
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -5; }
  else if (edge === 1) { x = W + 5; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + 5; }
  else { x = -5; y = Math.random() * H; }
  const cx = W / 2, cy = H / 2;
  const ang = Math.atan2(cy - y, cx - x) + (Math.random() - 0.5) * 0.8;
  const sp = 0.4 + Math.random() * 1.2;
  return { x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: 1 };
}

spawnParticles(params.count);
// start with a central well
addWell(W / 2, H / 2, 1.4);

// ---- Interaction ----
let dragging = false, lastX = 0, lastY = 0, dragWell = null;

canvas.addEventListener('mousedown', (e) => {
  if (e.button === 2) return;
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  dragWell = { x: e.clientX, y: e.clientY, mass: 1, r: 0, pulse: 1 };
  wells.push(dragWell);
  hideHint();
});
window.addEventListener('mousemove', (e) => {
  if (dragging && dragWell) { dragWell.x = e.clientX; dragWell.y = e.clientY; }
});
window.addEventListener('mouseup', () => { dragging = false; dragWell = null; });

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (!wells.length) return;
  let best = -1, bd = 1e9;
  for (let i = 0; i < wells.length; i++) {
    const dx = wells[i].x - e.clientX, dy = wells[i].y - e.clientY;
    const d = dx * dx + dy * dy;
    if (d < bd) { bd = d; best = i; }
  }
  if (best >= 0) wells.splice(best, 1);
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (!wells.length) return;
  let best = -1, bd = 1e9;
  for (let i = 0; i < wells.length; i++) {
    const dx = wells[i].x - e.clientX, dy = wells[i].y - e.clientY;
    const d = dx * dx + dy * dy;
    if (d < bd) { bd = d; best = i; }
  }
  if (best >= 0) {
    wells[best].mass = Math.max(-2, Math.min(6, wells[best].mass - Math.sign(e.deltaY) * 0.25));
    wells[best].pulse = 1;
  }
}, { passive: false });

// touch
canvas.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  dragging = true; dragWell = { x: t.clientX, y: t.clientY, mass: 1, r: 0, pulse: 1 };
  wells.push(dragWell); hideHint();
}, { passive: true });
canvas.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  if (dragging && dragWell) { dragWell.x = t.clientX; dragWell.y = t.clientY; }
}, { passive: true });
canvas.addEventListener('touchend', () => { dragging = false; dragWell = null; });

// ---- UI wiring ----
const $ = (id) => document.getElementById(id);
$('count').addEventListener('input', (e) => {
  params.count = +e.target.value; $('vCount').textContent = params.count;
  const diff = params.count - particles.length;
  if (diff > 0) for (let i = 0; i < diff; i++) particles.push(newParticle());
  else particles.length = params.count;
});
$('grav').addEventListener('input', (e) => { params.grav = +e.target.value; $('vGrav').textContent = params.grav.toFixed(2); });
$('trail').addEventListener('input', (e) => { params.trail = +e.target.value; $('vTrail').textContent = params.trail.toFixed(2); });
$('speed').addEventListener('input', (e) => { params.speed = +e.target.value; $('vSpeed').textContent = params.speed.toFixed(2); });
$('palette').addEventListener('click', () => {
  paletteIdx = (paletteIdx + 1) % PALETTES.length;
  $('palette').textContent = PALETTES[paletteIdx].name.toUpperCase();
});
$('orbit').addEventListener('click', () => {
  params.orbit = !params.orbit;
  $('orbit').classList.toggle('on', params.orbit);
});
$('burst').addEventListener('click', () => {
  for (const p of particles) {
    const a = Math.random() * Math.PI * 2, s = 3 + Math.random() * 6;
    p.vx += Math.cos(a) * s; p.vy += Math.sin(a) * s;
  }
});
$('clear').addEventListener('click', () => { wells = []; });

// mobile panel toggle
const ui = $('ui'), toggle = $('toggle');
if (window.innerWidth < 560) { ui.style.display = 'none'; toggle.style.display = 'block'; }
toggle.addEventListener('click', () => { ui.style.display = ui.style.display === 'none' ? 'block' : 'none'; });

let hintTimer = setTimeout(hideHint, 6000);
function hideHint() { $('hint').classList.add('fade'); clearTimeout(hintTimer); }

// ---- Main loop ----
function frame() {
  // fade for trails
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(5,6,15,' + (1 - params.trail) + ')';
  ctx.fillRect(0, 0, W, H);

  // draw wells
  ctx.globalCompositeOperation = 'lighter';
  for (const w of wells) {
    w.pulse *= 0.92;
    const rad = 14 + Math.abs(w.mass) * 10 + w.pulse * 30;
    const g = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, rad);
    const hot = w.mass >= 0;
    g.addColorStop(0, hot ? 'rgba(255,255,255,0.9)' : 'rgba(255,120,180,0.8)');
    g.addColorStop(0.3, hot ? 'rgba(150,200,255,0.35)' : 'rgba(120,80,255,0.3)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(w.x, w.y, rad, 0, Math.PI * 2); ctx.fill();
  }

  // update + draw particles
  const pal = PALETTES[paletteIdx];
  const G = params.grav * 1400;
  const dt = params.speed;
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    for (const w of wells) {
      let dx = w.x - p.x, dy = w.y - p.y;
      let d2 = dx * dx + dy * dy + 200;
      let inv = 1 / Math.sqrt(d2);
      let f = (G * w.mass) / d2;
      p.vx += dx * inv * f * 0.0016 * dt;
      p.vy += dy * inv * f * 0.0016 * dt;
      // orbit / tangential nudge for swirly galaxies
      if (params.orbit && w.mass > 0) {
        p.vx += -dy * inv * f * 0.0009 * dt;
        p.vy += dx * inv * f * 0.0009 * dt;
      }
    }
    p.vx *= 0.995; p.vy *= 0.995;
    p.x += p.vx * dt; p.y += p.vy * dt;

    // respawn if far off-screen or stalled forever
    if (p.x < -80 || p.x > W + 80 || p.y < -80 || p.y > H + 80) {
      particles[i] = newParticle(); continue;
    }

    const sp = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const hue = (pal.base + Math.min(1, sp / 6) * pal.range) % 360;
    const light = 45 + Math.min(40, sp * 6);
    ctx.fillStyle = 'hsl(' + hue.toFixed(0) + ',100%,' + light.toFixed(0) + '%)';
    const size = sp > 4 ? 1.8 : 1.2;
    ctx.fillRect(p.x, p.y, size, size);
  }

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
