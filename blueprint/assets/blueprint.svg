<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMinYMax slice">
  <!-- Faint drafting linework beneath the CSS graph grid. Colours are baked
       (a background image can't inherit CSS vars); kept low-opacity so text
       over it stays readable.

       Anchored left-bottom, same as the moving layer (scroll-gears.js).
       The moving parts always win — static art only goes where they never
       reach, at ANY window aspect:
         - gears own the lower-left block (x < 640, y > 560)
         - the belt runs y ~ 748-878 across the sheet, with a guide roller
           hanging from the top on a fixed column at x = 960
         - the pulley column hugs the right edge (x >= ~1030 for y < 880)
       So: static cream linework stays in the upper-left area (right edges
       < 940), and the amber doodles live below the belt (y > 885). -->

  <!-- ===== register mark, top-left corner ===== -->
  <g stroke="#E9E2CF" fill="none" stroke-opacity="0.11" stroke-width="1">
    <circle cx="70" cy="90" r="12" />
    <line x1="50" y1="90" x2="90" y2="90" />
    <line x1="70" y1="70" x2="70" y2="110" />
  </g>

  <!-- ===== protractor / compass rose, upper-left-of-centre =====
       (partially off-screen on phones, which is fine) -->
  <g transform="translate(720,300)">
    <g stroke="#E9E2CF" fill="none" stroke-opacity="0.10">
      <circle r="210" stroke-width="1" />
      <circle r="176" stroke-width="1" />
      <circle r="150" stroke-width="1" />
      <circle r="163" stroke-width="1" stroke-opacity="0.8"
              stroke-dasharray="1 8" stroke-linecap="round" />
    </g>
    <g stroke="#E9E2CF" stroke-width="1" stroke-opacity="0.11">
      <g><line x1="0" y1="-210" x2="0" y2="-176" /></g>
      <g transform="rotate(15)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(30)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(45)"><line x1="0" y1="-210" x2="0" y2="-176" /></g>
      <g transform="rotate(60)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(75)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(90)"><line x1="0" y1="-210" x2="0" y2="-176" /></g>
      <g transform="rotate(105)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(120)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(135)"><line x1="0" y1="-210" x2="0" y2="-176" /></g>
      <g transform="rotate(150)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(165)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(180)"><line x1="0" y1="-210" x2="0" y2="-176" /></g>
      <g transform="rotate(210)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(240)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(270)"><line x1="0" y1="-210" x2="0" y2="-176" /></g>
      <g transform="rotate(300)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <g transform="rotate(330)"><line x1="0" y1="-210" x2="0" y2="-190" /></g>
      <line x1="-210" y1="0" x2="210" y2="0" stroke-opacity="0.6" />
      <line x1="0" y1="-210" x2="0" y2="210" stroke-opacity="0.6" />
    </g>
  </g>

  <!-- ===== small crosshair centre marks ===== -->
  <g stroke="#E9E2CF" fill="none" stroke-opacity="0.09" stroke-width="1">
    <path d="M300,72 v16 M292,80 h16" />
    <path d="M660,532 v16 M652,540 h16" />
  </g>

  <!-- ===== coffee-ring stain (someone works at this desk) ===== -->
  <g stroke="#F0C987" fill="none" stroke-linecap="round">
    <circle cx="900" cy="70" r="36" stroke-width="3" stroke-opacity="0.10"
            stroke-dasharray="70 16 48 22" />
    <circle cx="900" cy="70" r="31" stroke-width="2" stroke-opacity="0.075"
            stroke-dasharray="44 30 52 38" transform="rotate(140 900 70)" />
  </g>

  <!-- ===== paper plane on a dotted loop-the-loop, low strip under the belt ===== -->
  <g stroke="#F0C987" fill="none">
    <path d="M650,948 C726,921 786,911 834,922
             C862,928 884,943 899,930
             C913,918 898,896 880,901
             C862,906 868,930 896,935
             C920,939 944,925 962,908"
          stroke-opacity="0.30" stroke-width="1.6"
          stroke-dasharray="0.1 10" stroke-linecap="round" />
    <g transform="translate(976,901) rotate(-16)" stroke-opacity="0.34" stroke-width="1.2"
       stroke-linejoin="round">
      <path d="M30,0 L-18,-12 L-10,0 L-18,12 Z" />
      <line x1="30" y1="0" x2="-10" y2="0" />
    </g>
    <!-- little sparkles along the trail -->
    <g stroke-opacity="0.28" stroke-width="1">
      <path d="M754,903 v10 M749,908 h10" />
      <path d="M932,946 v10 M927,951 h10" />
      <path d="M700,888 v10 M695,893 h10" />
    </g>
  </g>

  <!-- ===== doodled star, past the plane ===== -->
  <polygon points="1150,922 1154,931 1164,932 1156,938 1158,948 1150,942 1141,947 1144,938 1137,931 1146,931"
           fill="none" stroke="#F0C987" stroke-opacity="0.30" stroke-width="1.2"
           stroke-linejoin="round" transform="rotate(-8 1150 935)" />
</svg>
